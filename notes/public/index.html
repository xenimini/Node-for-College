<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 50%, #ffcc00 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 106, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .user-info {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .stats {
            background: rgba(255,255,255,0.25);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 1.1em;
            backdrop-filter: blur(5px);
        }
        .controls {
            padding: 20px 30px;
            background: #fff5e6;
            border-bottom: 2px solid #ff9500;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #ff9500 0%, #ffaa33 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 149, 0, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6a00 0%, #ff8c00 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.3);
        }
        .content {
            padding: 30px;
            min-height: 400px;
            background: #fffaf5;
        }
        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .note-card {
            background: white;
            border: 1px solid #ffd89a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6a00, #ff9500, #ffcc00);
        }
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 106, 0, 0.2);
            border-color: #ff9500;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ff9500;
            font-size: 0.9em;
            color: #ff6a00;
        }
        .note-title {
            font-size: 1.3em;
            color: #ff6a00;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .note-content {
            color: #8b5a2b;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .delete-btn {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ffd89a;
            border-radius: 6px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .collapsed {
            max-height: 80px;
            overflow: hidden;
            position: relative;
        }
        .expanded {
            max-height: none;
        }
        .btn-82 {
            background: none;
            border: none;
            color: #ff6a00;
            cursor: pointer;
            padding: 5px;
        }
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
            .notes-list {
                grid-template-columns: 1fr;
            }
            .user-info {
                position: static;
                margin-bottom: 10px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <span id="usernameDisplay"></span>
            <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        <h1>📝 Мои заметки</h1>
        <div id="stats" class="stats">Загрузка...</div>
    </div>
    <div class="controls">
        <button class="btn-secondary" onclick="showAllNotes()">📋 Показать заметки</button>
        <button class="btn-primary" onclick="openAddModal()">➕ Добавить заметку</button>
        <button class="btn-danger" onclick="openDeleteAllConfirm()">🗑 Удалить все</button>
    </div>
    <div id="content" class="content">
        <div class="empty-state">📭 Нажмите "Показать заметки"</div>
    </div>
</div>

<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Добавить заметку</h3>
        <input type="text" id="noteTitle" placeholder="Заголовок">
        <textarea id="noteContent" rows="5" placeholder="Текст заметки"></textarea>
        <div class="modal-buttons">
            <button onclick="closeModal()">Отмена</button>
            <button class="btn-primary" onclick="saveNote()">Сохранить</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3 id="confirmHeader">Подтверждение</h3>
        <p id="confirmMessage"></p>
        <p id="noteTitleDisplay" style="font-weight: bold; margin: 10px 0;"></p>
        <div class="modal-buttons">
            <button onclick="closeConfirmModal()">Отмена</button>
            <button class="btn-danger" onclick="executeDelete()">Удалить</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
