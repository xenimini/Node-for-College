<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в заметки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 50%, #ffcc00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #ff6a00;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ff9500;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0b3;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff9500;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6a00, #ff9500);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,106,0,0.4);
        }
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #8b5a2b;
        }
        .toggle a {
            color: #ff6a00;
            cursor: pointer;
            text-decoration: underline;
        }
        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 id="formTitle">📝 Вход</h2>
    <div id="errorMsg" class="error" style="display: none;"></div>
    <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" id="username" placeholder="Введите имя">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль">
    </div>
    <button id="actionBtn">Войти</button>
    <div class="toggle">
        <span id="toggleText">Нет аккаунта? </span><a id="toggleLink">Зарегистрироваться</a>
    </div>
</div>

<script>
    let isLogin = true;
    const formTitle = document.getElementById('formTitle');
    const actionBtn = document.getElementById('actionBtn');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    const errorDiv = document.getElementById('errorMsg');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showError('Заполните все поля');
            return;
        }
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('username', data.user.username);
                window.location.href = '/';
            } else {
                showError(data.error || 'Ошибка входа');
            }
        } catch (err) {
            showError('Сервер недоступен');
        }
    }

    async function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showError('Заполните все поля');
            return;
        }
        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите.');
                toggleMode();
            } else {
                showError(data.error || 'Ошибка регистрации');
            }
        } catch (err) {
            showError('Сервер недоступен');
        }
    }

    function toggleMode() {
        isLogin = !isLogin;
        if (isLogin) {
            formTitle.innerText = '📝 Вход';
            actionBtn.innerText = 'Войти';
            toggleText.innerText = 'Нет аккаунта? ';
            toggleLink.innerText = 'Зарегистрироваться';
        } else {
            formTitle.innerText = '📝 Регистрация';
            actionBtn.innerText = 'Зарегистрироваться';
            toggleText.innerText = 'Уже есть аккаунт? ';
            toggleLink.innerText = 'Войти';
        }
    }

    actionBtn.onclick = () => isLogin ? login() : register();
    toggleLink.onclick = toggleMode;
</script>
</body>
</html>
